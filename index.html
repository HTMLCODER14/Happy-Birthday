<!DOCTYPE html>
<!-- 🌟 تم إضافة translate="no" هنا لمنع المتصفح من إجبار الصفحة على الترجمة التلقائية -->
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate"> <!-- 🌟 وسم إضافي مخصص لجوجل كروم لمنع الترجمة التلقائية -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="title" content="Happy Birthday Website 2.0 | Customized">
  <title>Birthday Gift Animation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

  <!-- ❤️ Floating Heart Cursor Script -->
  <script type="text/javascript">
  var colours = ['#ff3366', '#ff6699', '#ff33cc', '#ff99cc', '#ff66b2', '#ff0066']; 
  var minisize = 16; 
  var maxisize = 28; 
  var hearts = 66; 
  var over_or_under = "over"; 

  var x = ox = 400;
  var y = oy = 300;
  var swide = 800;
  var shigh = 600;
  var sleft = sdown = 0;
  var herz = [];
  var herzx = [];
  var herzy = [];
  var herzs = [];
  var kiss = false;

  if (typeof('addRVLoadEvent') != 'function') function addRVLoadEvent(funky) {
    var oldonload = window.onload;
    if (typeof(oldonload) != 'function') window.onload = funky;
    else window.onload = function() {
      if (oldonload) oldonload();
      funky();
    }
  }

  addRVLoadEvent(mwah);

  function mwah() { if (document.getElementById) {
    var i, heart;
    for (i = 0; i < hearts; i++) {
      heart = createDiv("auto", "auto");
      heart.style.visibility = "hidden";
      heart.style.zIndex = (over_or_under == "over") ? "1001" : "0";
      heart.style.color = colours[i % colours.length];
      heart.style.pointerEvents = "none";
      heart.style.opacity = 0.75;
      heart.appendChild(document.createTextNode(String.fromCharCode(9829)));
      document.body.appendChild(heart);
      herz[i] = heart;
      herzy[i] = false;
    }
    set_scroll();
    set_width();
    herzle();
  }}

  function herzle() {
    var c;
    if (Math.abs(x - ox) > 1 || Math.abs(y - oy) > 1) {
      ox = x;
      oy = y;
      for (c = 0; c < hearts; c++) if (herzy[c] === false) {
        herz[c].firstChild.nodeValue = String.fromCharCode(9829);
        herz[c].style.left = (herzx[c] = x - minisize / 2) + "px";
        herz[c].style.top = (herzy[c] = y - minisize) + "px";
        herz[c].style.fontSize = minisize + "px";
        herz[c].style.fontWeight = 'normal';
        herz[c].style.visibility = 'visible';
        herzs[c] = minisize;
        break;
      }
    }
    for (c = 0; c < hearts; c++) if (herzy[c] !== false) blow_me_a_kiss(c);
    setTimeout(herzle, 40);
  }

  document.onmousedown = pucker;
  document.onmouseup = function() { clearTimeout(kiss); };

  function pucker() {
    ox = -1;
    oy = -1;
    kiss = setTimeout(pucker, 100);
  }

  function blow_me_a_kiss(i) {
    herzy[i] -= herzs[i] / minisize + i % 2;
    herzx[i] += (i % 5 - 2) / 5;
    if (herzy[i] < sdown - herzs[i] || herzx[i] < sleft - herzs[i] || herzx[i] > sleft + swide - herzs[i]) {
      herz[i].style.visibility = "hidden";
      herzy[i] = false;
    }
    else if (herzs[i] > minisize + 2 && Math.random() < .5 / hearts) break_my_heart(i);
    else {
      if (Math.random() < maxisize / herzy[i] && herzs[i] < maxisize) herz[i].style.fontSize = (++herzs[i]) + "px";
      herz[i].style.top = herzy[i] + "px";
      herz[i].style.left = herzx[i] + "px";
    }
  }

  function break_my_heart(i) {
    herz[i].firstChild.nodeValue = String.fromCharCode(9676);
    herz[i].style.fontWeight = 'bold';
    herzy[i] = false;
    setTimeout(() => herz[i].style.visibility = "hidden", 400);
  }

  document.onmousemove = mouse;
  function mouse(e) {
    if (e) { y = e.pageY; x = e.pageX; }
    else { set_scroll(); y = event.y + sdown; x = event.x + sleft; }
  }

  window.onresize = set_width;
  function set_width() {
    var sw_min = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
    var sh_min = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    swide = sw_min;
    shigh = sh_min;
  }

  window.onscroll = set_scroll;
  function set_scroll() {
    sdown = window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    sleft = window.pageXOffset || document.documentElement.scrollLeft || document.body.scrollLeft || 0;
  }

  function createDiv(height, width) {
    var div = document.createElement("div");
    div.style.position = "absolute";
    div.style.height = height;
    div.style.width = width;
    div.style.overflow = "hidden";
    div.style.backgroundColor = "transparent";
    return div;
  }
  </script>
</head>

<body>

  <!-- 🛠️ واجهة التحكم والمنشئ -->
  <div id="setup__container">
    <div class="setup__box">
      <h2><i class="fa-solid fa-wand-magic-sparkles"></i> صانع هدايا أعياد الميلاد</h2>
      <p class="subtitle">اختر البيانات لإنشاء رابط مخصص وإرساله لمن تحب</p>
      
      <div class="input__group">
        <label>اختر تاريخ الميلاد:</label>
        <div class="date__selectors">
          <select id="select__day"></select>
          <select id="select__month">
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>
          </select>
          <select id="select__year"></select>
        </div>
      </div>

      <div class="input__group">
        <label>رسالة المعايدة الأساسية:</label>
        <textarea id="custom__msg" placeholder="اكتب رسالتك باللغة التي تفضلها (عربي أو إنجليزي)..."></textarea>
        <button id="btn__default--msg" type="button"><i class="fa-solid fa-quote-left"></i> استخدام الرسالة الافتراضية</button>
      </div>

      <button id="btn__generate">إنشاء رابط الهدية المخصص <i class="fa-solid fa-link"></i></button>

      <div id="result__link--box" style="display: none;">
        <p>تم إنشاء الرابط بنجاح! انسخه الآن وأرسله:</p>
        <div class="copy__input--wrapper">
          <input type="text" id="generated__url" readonly>
          <button id="btn__copy">نسخ <i class="fa-regular fa-copy"></i></button>
        </div>
      </div>
    </div>
  </div>


  <!-- 🎁 واجهة عرض الهدية -->
  <div id="wrapper" style="display: none;">
    <div class="flag__birthday">
      <img src="1.png" alt="" width="350" class="flag__left">
      <img src="1.png" alt="" width="350" class="flag__right">
    </div>

    <div class="content">
      <div class="left">
        <!-- 🌟 تم تجميد نصوص الهيدر عبر خاصية translate="no" لمنع المتصفح من تغييرها -->
        <div class="title" translate="no">
          <h1 class="happy">
            <span style="--t: 4s;">H</span>
            <span style="--t: 4.2s;">a</span>
            <span style="--t: 4.4s;">p</span>
            <span style="--t: 4.6s;">p</span>
            <span style="--t: 4.8s;">y</span>
          </h1>
          <h1 class="birthday">
            <span style="--t: 5s;">B</span>
            <span style="--t: 5.2s;">i</span>
            <span style="--t: 5.4s;">r</span>
            <span style="--t: 5.6s;">t</span>
            <span style="--t: 5.8s;">h</span>
            <span style="--t: 6s;">d</span>
            <span style="--t: 6.2s;">a</span>
            <span style="--t: 6.4s;">y</span>
          </h1>
          <div class="hat">
            <img src="hat.png" alt="">
          </div>
        </div>

        <div class="date__of__birth" translate="no">
          <span></span>
        </div>

        <div class="btn">
          <button id="btn__letter">
            اضغط هنا 
            <i class="fa-regular fa-envelope"></i>
          </button>
        </div>
      </div>

      <div class="right">
        <div class="box__account">
          <div class="image">
            <img src="img.png" alt="">
          </div>
          <div class="name" translate="no">
            <i class="fa-solid fa-heart"></i>
            <span>Cutie</span>
            <i class="fa-solid fa-heart"></i>
          </div>
          <div class="balloon_one">
            <img width="100px" src="balloon1.png" alt="">
          </div>
          <div class="balloon_two">
            <img width="100px" src="balloon2.png" alt="">
          </div>
        </div>

        <!-- 🌟 تم حماية النص الدائري الملتف أيضاً من الترجمة العشوائية للمتصفح -->
        <div class="cricle" translate="no">
          <div class="text__cricle">
            <span style="--i: 1;">h</span>
            <span style="--i: 2;">a</span>
            <span style="--i: 3;">p</span>
            <span style="--i: 4;">p</span>
            <span style="--i: 5;">y</span>
            <span style="--i: 6;">-</span>
            <span style="--i: 7;">b</span>
            <span style="--i: 8;">i</span>
            <span style="--i: 9;">r</span>
            <span style="--i: 10;">t</span>
            <span style="--i: 11;">h</span>
            <span style="--i: 12;">d</span>
            <span style="--i: 13;">a</span>
            <span style="--i: 14;">y</span>
            <span style="--i: 15;">-</span>
          </div>
          <i class="fa-solid fa-heart"></i>
        </div>
      </div>
    </div>

    <!-- تزيينات النجوم والورود -->
    <div class="decorate_star star1" style="--t: 15s;"></div>
    <div class="decorate_star star2" style="--t: 15.2s;"></div>
    <div class="decorate_star star3" style="--t: 15.4s;"></div>
    <div class="decorate_star star4" style="--t: 15.6s;"></div>
    <div class="decorate_star star5" style="--t: 15.8s;"></div>
    <div class="decorate_flower--one" style="--t: 15s;"><img width="20" src="decorate_flower.png" alt=""></div>
    <div class="decorate_flower--two" style="--t: 15.3s;"><img width="20" src="decorate_flower.png" alt=""></div>
    <div class="decorate_flower--three" style="--t: 15.6s;"><img width="20" src="decorate_flower.png" alt=""></div>
    <div class="decorate_bottom"><img src="decorate.png" alt="" width="100"></div>
    <div class="smiley__icon"><img src="smiley_icon.png" alt="" width="100"></div>

    <!-- Letter Box -->
    <div class="box__letter">
      <div class="letter__border">
        <div class="letter">
          <div class="title__letter" translate="no"></div>
          <div class="content__letter">
            <div class="left">
              <img id="heart__letter" src="https://media0.giphy.com/media/c76IJLufpNwSULPk77/giphy.gif" alt="">
              <img class="heart heart_1" style="--t: 0.2s" width="20" src="heart.png" alt="">
              <img class="heart heart_2" style="--t: 0.4s" width="20" src="heart.png" alt="">
              <img class="heart heart_3" style="--t: 0.6s" width="20" src="heart.png" alt="">
              <img class="heart heart_4" style="--t: 0.8s" width="20" src="heart.png" alt="">
            </div>
            <div class="right">
              <div class="love__img">
                <img src="https://media4.giphy.com/media/W4jyjmIpnw6e38B6Qc/giphy.gif" alt="" width="220">
              </div>
              <div class="text__letter">
                <p></p>
              </div>
              
              <button id="btn__translate" style="display:none;"><i class="fa-solid fa-language"></i> ترجمة الرسالة / Translate</button>
              
              <img id="mewmew" width="80" src="mewmew.gif" alt="">
            </div>
          </div>
        </div>
        <div class="close">
          <i class="fa-solid fa-xmark"></i>
        </div>
      </div>
    </div>
  </div>

  <script>
    const defaultMsg = "You are a very special girl. Today, I wish you all the best, lots of health, and lots of joy. I always hope we will celebrate many more birthdays like this together. Happy birthday to you.💕";
    
    for(let d=1; d<=31; d++) { $('#select__day').append(`<option value="${d < 10 ? '0'+d : d}">${d < 10 ? '0'+d : d}</option>`); }
    for(let y=new Date().getFullYear(); y>=1950; y--) { $('#select__year').append(`<option value="${y}">${y}</option>`); }

    $('#btn__default--msg').on('click', function() { $('#custom__msg').val(defaultMsg); });

    function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
    function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

    $('#btn__generate').on('click', function() {
      let day = $('#select__day').val();
      let month = $('#select__month').val();
      let year = $('#select__year').val();
      let msg = $('#custom__msg').val().trim();
      if(!msg) msg = defaultMsg;

      let finalDate = `${day} ${month} ${year}`;
      let encodedMsg = utf8_to_b64(msg);
      let currentUrl = window.location.href.split('?')[0];
      let generatedUrl = `${currentUrl}?date=${encodeURIComponent(finalDate)}&msg=${encodedMsg}`;

      $('#generated__url').val(generatedUrl);
      $('#result__link--box').slideDown();
    });

    $('#btn__copy').on('click', function() {
      let copyText = document.getElementById("generated__url");
      copyText.select();
      navigator.clipboard.writeText(copyText.value);
      alert("تم نسخ الرابط بنجاح! أرسله لمن تحب الآن 🎁");
    });

    const urlParams = new URLSearchParams(window.location.search);
    let datetxt = urlParams.get('date');
    let datatxtletter = urlParams.get('msg');

    if (datetxt && datatxtletter) {
      $('#setup__container').remove();
      $('#wrapper').show();

      try { datatxtletter = b64_to_utf8(datatxtletter); } catch(e) { datatxtletter = defaultMsg; }

      let titleLetter = "To you";
      let charArrDate = datetxt.split('');
      let charArrDateLetter = datatxtletter.split('');
      let charArrTitle = titleLetter.split('');
      let currentIndex = 0;
      let currentIndexLetter = 0;
      let currentIndexTitle = 0;
      let date__of__birth = document.querySelector(".date__of__birth span");
      let text__letter = document.querySelector(".text__letter p");

      setTimeout(function(){
        timeDatetxt = setInterval(function(){
          if(currentIndex < charArrDate.length){
            date__of__birth.textContent += charArrDate[currentIndex];
            currentIndex++;
          } else {
            let i = document.createElement("i");
            i.className = "fa-solid fa-star";
            document.querySelector(".date__of__birth").prepend(i);
            document.querySelector(".date__of__birth").appendChild(i.cloneNode(true));
            clearInterval(timeDatetxt);
          }
        },100)
      },12000);

      var intervalContent;
      var intervalTitle;

      $("#btn__letter").on("click", function(){
        $(".box__letter").slideDown();
        setTimeout(function(){ $(".letter__border").slideDown(); },1000);
        
        setTimeout(function(){
          intervalTitle = setInterval(function(){
            if(currentIndexTitle < charArrTitle.length){
              document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle];
              let i = document.createElement("i");
              i.className = "fa-solid fa-heart";
              document.querySelector(".title__letter").appendChild(i);
              currentIndexTitle++;
            } else { clearInterval(intervalTitle); }
          },100);
        },2000);

        setTimeout(function(){
          document.querySelector("#heart__letter").classList.add("animationOp");
          document.querySelector(".love__img").classList.add("animationOp");
          document.querySelector("#mewmew").classList.add("animationOp");
        },2800);

        setTimeout(function(){
          document.querySelectorAll(".heart").forEach((item)=>{ item.classList.add("animation"); });
        },3500);

        setTimeout(function(){
          intervalContent = setInterval(function(){
            if(currentIndexLetter < charArrDateLetter.length){
              text__letter.textContent += charArrDateLetter[currentIndexLetter];
              currentIndexLetter++;
            } else {
              clearInterval(intervalContent);
              $('#btn__translate').fadeIn();
            }
          },50);
        },6000);
      });

      let originalText = datatxtletter;
      let translatedText = ""; 
      let isTranslated = false;

      $('#btn__translate').on('click', function() {
        if (isTranslated) {
          $('.text__letter p').text(originalText);
          isTranslated = false;
        } else {
          if (translatedText !== "") {
            $('.text__letter p').text(translatedText);
            isTranslated = true;
          } else {
            let isArabic = /[\u0600-\u06FF]/.test(originalText);
            let sourceLang = isArabic ? 'ar' : 'en';
            let targetLang = isArabic ? 'en' : 'ar';
            
            $('#btn__translate').html('<i class="fa-solid fa-spinner fa-spin"></i> جاري الترجمة...');

            let apiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(originalText)}`;
            
            $.getJSON(apiUrl, function(data) {
              let result = "";
              data[0].forEach(function(line) {
                if (line[0]) result += line[0];
              });
              translatedText = result;
              $('.text__letter p').text(translatedText);
              $('#btn__translate').html('<i class="fa-solid fa-language"></i> استعادة النص الأصلي');
              isTranslated = true;
            }).fail(function() {
              alert("عذراً، حدث خطأ أثناء الاتصال بخدمة الترجمة.");
              $('#btn__translate').html('<i class="fa-solid fa-language"></i> ترجمة الرسالة / Translate');
            });
          }
        }
      });

      $(".close").on("click", function(){
        clearInterval(intervalContent);
        document.querySelector(".title__letter").textContent = "";
        text__letter.textContent = "";
        currentIndexLetter = 0;
        currentIndexTitle = 0;
        isTranslated = false;
        $('#btn__translate').hide().html('<i class="fa-solid fa-language"></i> ترجمة الرسالة / Translate');
        document.querySelector("#heart__letter").classList.remove("animationOp");
        document.querySelector(".love__img").classList.remove("animationOp");
        document.querySelector("#mewmew").classList.remove("animationOp");
        document.querySelectorAll(".heart").forEach((item)=>{ item.classList.remove("animation"); });
        $(".box__letter").slideUp();
        $(".letter__border").slideUp();
      });

    } else {
      $('#setup__container').show();
      $('#wrapper').remove();
    }
  </script>
</body>
</html>
